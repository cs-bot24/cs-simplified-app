name: cs_simplified
description: CS Simplified - Academic Learning Platform
publish_to: 'none'
version: 1.0.6+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.0
  http: ^1.2.0
  http_parser: ^4.0.2
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # ── PDF viewer ────────────────────────────────────────────────────────────
  # WebView used on mobile. On web, PDFs open via url_launcher in a new tab.
  webview_flutter: ^4.4.0

  # ── Networking & file I/O ─────────────────────────────────────────────────
  path_provider: ^2.1.0
  dio: ^5.4.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.0

  # ── Other app features ────────────────────────────────────────────────────
  cached_network_image: ^3.3.0
  file_picker: ^8.0.0          # Works on web — returns Uint8List
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  share_plus: ^9.0.0
  open_filex: ^4.3.4
  gal: ^2.3.0

  # ── AI Tutor ──────────────────────────────────────────────────────────────
  image_picker: ^1.1.2          # Works on web — gallery only, no camera
  flutter_markdown: ^0.7.4
  flutter_math_fork: ^0.7.2     # LaTeX / KaTeX math rendering (all platforms)

  # ── Study Planner ─────────────────────────────────────────────────────────
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Flutter Web renderer — auto selects HTML for mobile, CanvasKit for desktop
  # Override with: flutter build web --web-renderer canvaskit
