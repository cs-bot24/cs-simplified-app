name: cs_simplified
description: CS Simplified - Academic Learning Platform
publish_to: 'none'
version: 1.0.7+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.0
  http: ^1.2.0
  http_parser: ^4.0.2
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # ── PDF viewer ────────────────────────────────────────────────────────────
  # WebView used on mobile. On web, PDFs open via url_launcher in a new tab.
  webview_flutter: ^4.4.0

  # ── Networking & file I/O ─────────────────────────────────────────────────
  path_provider: ^2.1.0
  dio: ^5.4.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.0

  # ── Offline Materials System ──────────────────────────────────────────────
  sqflite: ^2.3.3          # Local database: offline_materials, downloads, bookmarks
  # Windows desktop backend for sqflite (Phase 1, desktop audit Part 6).
  # The native sqflite plugin only ships Android/iOS/macOS implementations;
  # sqflite_common_ffi provides an FFI-based SQLite backend for Windows/Linux.
  # Wired in via lib/core/platform_init.dart — does NOT touch AppDatabase's
  # schema, queries, or migrations. See that file for the platform gate.
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0              # Path joining for db/file paths
  connectivity_plus: ^6.0.5 # Network state (offline banner, Wi-Fi-only downloads)
  crypto: ^3.0.3             # SHA-256 checksums for file integrity verification

  # ── Offline PDF rendering (see lib/services/pdf/ abstraction layer) ────────
  # NOTE: the app must never call this package directly outside of
  # PdfxRenderer — always go through PdfRendererService.
  # (Was syncfusion_flutter_pdfviewer — dropped after its Android plugin
  # failed to compile against this project's Flutter SDK: legacy v1-embedding
  # code referencing the removed PluginRegistry.Registrar class. pdfx is a
  # much leaner, MIT-licensed, actively-maintained package with no such
  # legacy baggage. Swapping renderers only touches this one file plus
  # lib/services/pdf/ thanks to the IPdfRenderer abstraction.)
  pdfx: ^2.6.0

  # ── Other app features ────────────────────────────────────────────────────
  cached_network_image: ^3.3.0
  file_picker: ^8.0.0          # Works on web — returns Uint8List
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  share_plus: ^9.0.0
  open_filex: ^4.3.4
  gal: ^2.3.0

  # ── AI Tutor ──────────────────────────────────────────────────────────────
  image_picker: ^1.1.2          # Works on web — gallery only, no camera
  flutter_markdown: ^0.7.4
  flutter_math_fork: ^0.7.2     # LaTeX/KaTeX rendering for math expressions

  # ── Study Planner ─────────────────────────────────────────────────────────
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Flutter Web renderer — auto selects HTML for mobile, CanvasKit for desktop
  # Override with: flutter build web --web-renderer canvaskit
