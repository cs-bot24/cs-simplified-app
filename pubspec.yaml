name: cs_simplified
description: CS Simplified - Academic Learning Platform
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.0
  http: ^1.2.0
  http_parser: ^4.0.2
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # ── PDF viewer (NEW) ──────────────────────────────────────────────────────
  # Replaces syncfusion_flutter_pdfviewer entirely.
  # WebView renders the Google Drive viewer URL for stability & zero licensing.
  webview_flutter: ^4.4.0

  # ── Networking & file I/O (unchanged) ────────────────────────────────────
  path_provider: ^2.1.0
  dio: ^5.4.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.0

  # ── Other app features (unchanged) ────────────────────────────────────────
  cached_network_image: ^3.3.0
  file_picker: ^8.0.0
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  share_plus: ^9.0.0
  open_filex: ^4.3.4
  image_gallery_saver: ^1.7.1  # Phase 1.5D-C: save share cards to gallery

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
