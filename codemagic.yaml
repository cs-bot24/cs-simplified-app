# ─────────────────────────────────────────────────────────────────────────────
# codemagic.yaml — CS Simplified
#
# Workflow: build_and_release
#   1. Installs Flutter dependencies
#   2. Builds a release APK
#   3. Publishes the APK to GitHub Releases automatically
#
# Required environment variables (set in Codemagic UI → Environment variables):
#
#   GITHUB_TOKEN
#     A GitHub Personal Access Token with "repo" scope.
#     Generate at: github.com → Settings → Developer settings →
#                  Personal access tokens → Tokens (classic) → Generate new token
#     Select scope: repo (full control of private repositories)
#     Copy the token and paste it here as a secret variable.
#
#   GITHUB_REPO
#     Your GitHub repo in owner/repo format.
#     Example: KhalidAnas/cs-simplified
#
# Optional (for APK signing — recommended before Play Store):
#   CM_KEYSTORE          (base64-encoded keystore file)
#   CM_KEYSTORE_PASSWORD
#   CM_KEY_ALIAS
#   CM_KEY_PASSWORD
#
# ─────────────────────────────────────────────────────────────────────────────

workflows:

  build_and_release:
    name: Build & Publish to GitHub Releases
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java:    17
      vars:
        GITHUB_TOKEN: $GITHUB_TOKEN   # Set as secret in Codemagic UI
        GITHUB_REPO:  $GITHUB_REPO    # e.g. KhalidAnas/cs-simplified

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    scripts:
      # ── 1. Install dependencies ────────────────────────────────────────────
      - name: Get Flutter packages
        script: flutter pub get

      # ── 2. Run analyzer (catches compile errors before building) ───────────
      - name: Analyze
        script: flutter analyze --no-fatal-infos
        ignore_failure: true

      # ── 3. Build release APK ───────────────────────────────────────────────
      - name: Build APK
        script: |
          flutter build apk --release \
            --build-name=$(grep "^version:" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1) \
            --build-number=$(($(date +%s) % 100000))

      # ── 4. Publish to GitHub Releases ──────────────────────────────────────
      - name: Publish to GitHub Releases
        script: |
          set -e

          # Read version from pubspec.yaml
          VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
          TAG="v${VERSION}-build-${CM_BUILD_NUMBER}"
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          APK_NAME="CS-Simplified-${TAG}.apk"

          echo "Publishing $APK_NAME as $TAG to $GITHUB_REPO"

          # Create the GitHub release
          RELEASE_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$GITHUB_REPO/releases" \
            -d "{
              \"tag_name\":         \"$TAG\",
              \"target_commitish\": \"main\",
              \"name\":             \"CS Simplified $TAG\",
              \"body\":             \"## CS Simplified $TAG\n\nBuilt automatically by Codemagic.\n\n### Install\n1. Download the APK below\n2. Open it on your Android device\n3. Allow installation from unknown sources if prompted\",
              \"draft\":            false,
              \"prerelease\":       false
            }")

          # Extract upload URL from the response
          UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'])" | \
            sed 's/{?name,label}//')

          if [ -z "$UPLOAD_URL" ]; then
            echo "Failed to create release. Response:"
            echo "$RELEASE_RESPONSE"
            exit 1
          fi

          echo "Upload URL: $UPLOAD_URL"

          # Upload the APK to the release
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$APK_PATH" \
            "$UPLOAD_URL?name=$APK_NAME&label=Download%20APK"

          echo ""
          echo "✅ Published successfully!"
          echo "Download: https://github.com/$GITHUB_REPO/releases/tag/$TAG"

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - khabeel661@gmail.com
        notify:
          success: true
          failure: true
