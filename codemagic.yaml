# ─────────────────────────────────────────────────────────────────────────────
# codemagic.yaml — CS Simplified
#
# Environment variable groups required in Codemagic App Settings:
#
#   Group: github
#     GITHUB_TOKEN   → GitHub Personal Access Token (repo scope) — Secret
#     GITHUB_REPO    → cs-bot24/cs-simplified-app
#
#   Group: keystore
#     CM_KEYSTORE        → base64-encoded cs_simplified.jks — Secret
#     KEY_ALIAS          → cs_simplified
#     KEY_PASSWORD       → your key password — Secret
#     KEYSTORE_PASSWORD  → your keystore password — Secret
# ─────────────────────────────────────────────────────────────────────────────

workflows:

  build_and_release:
    name: Build & Publish to GitHub Releases
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17
      groups:
        - github
        - keystore

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    scripts:
      # ── 1. Install dependencies ────────────────────────────────────────────
      - name: Get Flutter packages
        script: flutter pub get

      # ── 2. Analyze (non-fatal — warnings don't block build) ────────────────
      - name: Analyze
        script: flutter analyze --no-fatal-infos
        ignore_failure: true

      # ── 3. Build release APK ───────────────────────────────────────────────
      - name: Build APK
        script: |
          flutter build apk --release \
            --build-name=$(grep "^version:" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1) \
            --build-number=${CM_BUILD_NUMBER:-1}

      # ── 4. Sign APK with your keystore ─────────────────────────────────────
      # CM_KEYSTORE is base64-encoded. We decode it to a temp .jks file first,
      # then sign the APK with apksigner, then delete the temp file.
      - name: Sign APK
        script: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          KEYSTORE_PATH="/tmp/cs_simplified.jks"

          # Decode base64 keystore to a real .jks file
          echo "$CM_KEYSTORE" | base64 --decode > "$KEYSTORE_PATH"

          # Find the latest available build-tools version automatically
          BUILD_TOOLS=$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -1)
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner"

          echo "Using build-tools: $BUILD_TOOLS"
          echo "Key alias: $KEY_ALIAS"

          # Sign in-place
          "$APKSIGNER" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            "$APK_PATH"

          # Verify
          "$APKSIGNER" verify --verbose "$APK_PATH"
          echo "✅ APK signed successfully."

          # Clean up temp keystore
          rm -f "$KEYSTORE_PATH"

      # ── 5. Publish to GitHub Releases ──────────────────────────────────────
      - name: Publish to GitHub Releases
        script: |
          set -e

          VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
          BUILD=${CM_BUILD_NUMBER:-1}
          TAG="v${VERSION}-build-${BUILD}"
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          APK_NAME="CS-Simplified-${TAG}.apk"
          REPO="cs-bot24/cs-simplified-app"

          echo "Publishing $APK_NAME as $TAG to $REPO"
          echo "Token present: $([ -n "$GITHUB_TOKEN" ] && echo YES || echo NO)"

          # ── If the tag/release already exists, delete it first ──────────────
          EXISTING=$(curl -s \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/releases/tags/${TAG}")

          EXISTING_ID=$(echo "$EXISTING" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || true)

          if [ -n "$EXISTING_ID" ]; then
            echo "Release $TAG already exists (id=$EXISTING_ID) — deleting it first."

            curl -s -X DELETE \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/releases/${EXISTING_ID}"

            curl -s -X DELETE \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/git/refs/tags/${TAG}"

            echo "Old release and tag deleted."
          fi

          # ── Create the fresh release ────────────────────────────────────────
          RELEASE_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"target_commitish\": \"main\",
              \"name\": \"CS Simplified ${TAG}\",
              \"body\": \"## CS Simplified ${TAG}\n\nBuilt automatically by Codemagic.\n\n### How to Install\n1. Download the APK file below\n2. Open it on your Android device\n3. Tap Install (allow unknown sources if prompted)\",
              \"draft\": false,
              \"prerelease\": false
            }")

          echo "GitHub response: $RELEASE_RESPONSE"

          UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['upload_url'])" | \
            sed 's/{?name,label}//')

          if [ -z "$UPLOAD_URL" ]; then
            echo "ERROR: Could not get upload URL"
            exit 1
          fi

          echo "Uploading APK to: $UPLOAD_URL"

          curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"${APK_PATH}" \
            "${UPLOAD_URL}?name=${APK_NAME}&label=Download+APK"

          echo ""
          echo "✅ Done! Download at: https://github.com/${REPO}/releases/tag/${TAG}"

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - khabeel661@gmail.com
        notify:
          success: true
          failure: true
