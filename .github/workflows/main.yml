name: Build Windows Desktop

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Job-level so every step's flutter/cmake invocation inherits these —
      # in particular, `dart run msix:create` runs its own internal
      # `flutter build windows`, separate from the explicit build step below,
      # so scoping these to just one step isn't enough.
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
      # gal and permission_handler_windows use cppwinrt-generated code that
      # still includes <experimental/coroutine>. Newer MSVC STL versions
      # (see error C2338 / STL1011 in CI logs) hard-error on that header
      # unless this exact macro is defined. There's no windows/CMakeLists.txt
      # committed to this repo (it's regenerated every run by the
      # "Generate Windows platform" step from whatever Flutter 3.41.9
      # templates), so this can't be scoped to just those two plugin
      # targets via CMake — CL is read by cl.exe for every invocation in
      # this job, and this macro only affects the coroutine-deprecation
      # check, not other warnings/errors.
      CL: "/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate Windows platform
        run: flutter create --platforms=windows .

      - name: Analyze Flutter project
        run: flutter analyze --no-fatal-infos

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package as MSIX installer
        run: dart run msix:create

      - name: Locate generated MSIX + certificate (diagnostic)
        shell: pwsh
        run: |
          Write-Host "Searching entire repo for .msix files..."
          Get-ChildItem -Path . -Recurse -Filter *.msix -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "FOUND MSIX: $($_.FullName)" }
          Write-Host "Searching entire repo for .pfx files..."
          Get-ChildItem -Path . -Recurse -Filter *.pfx -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "FOUND PFX: $($_.FullName)" }

      - name: Upload Windows build (raw folder)
        uses: actions/upload-artifact@v4
        with:
          name: cs-simplified-windows-release
          path: build/windows/x64/runner/Release/

      - name: Upload MSIX installer
        uses: actions/upload-artifact@v4
        with:
          name: cs-simplified-windows-installer
          path: |
            **/*.msix
          if-no-files-found: error

      - name: Upload signing certificate
        uses: actions/upload-artifact@v4
        with:
          name: cs-simplified-windows-test-certificate
          path: |
            **/*.pfx
          if-no-files-found: error
