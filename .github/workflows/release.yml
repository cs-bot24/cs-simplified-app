name: Build Signed Release APK

# Two ways to trigger a build:
#   1. Every push to main          → builds and uploads APK as a workflow artifact only
#   2. Pushing a version tag (v*)  → ALSO creates a GitHub Release with the APK attached
#
# Runs on Linux (ubuntu-latest) — free, unlimited-feeling minutes (2,000/month
# on free GitHub accounts), and all that's needed for an Android build.
# No macOS runner required since we're not building for iOS here.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'   # e.g. v1.0.0, v1.2.3 — pushing a tag like this creates a Release

jobs:
  build-release-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    # Needed so the workflow is allowed to create a GitHub Release
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java (required by Gradle / Android build tools) ──────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Flutter SDK ────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'   # matches local Flutter version (flutter --version)
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Decode the release keystore from the GitHub secret ───────────────
      # KEYSTORE_BASE64 was created locally and pasted as a repo secret.
      # This step reverses that encoding and writes the real .jks file into
      # android/app/ for this run only — it is never committed and the
      # runner is destroyed after the job finishes.
      #
      # NOTE: we write the secret to a temp file first, then strip all
      # whitespace/newlines before decoding. echo "$VAR" can mangle
      # multi-line base64 content depending on how it was pasted — writing
      # straight to a file and cleaning it avoids that entirely.
      #
      # IMPORTANT: build.gradle.kts resolves CM_KEYSTORE_PATH relative to
      # the android/app/ module directory (Gradle's file() is relative to
      # the project dir, not the repo root) — so the path below must stay
      # in sync with the filename used in CM_KEYSTORE_PATH further down.
      - name: Decode release keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' > /tmp/keystore_clean.b64
          base64 --decode /tmp/keystore_clean.b64 > android/app/release-key.jks
          rm -f /tmp/keystore_clean.b64

      # ── Diagnostic: verify the decoded file is a real keystore ────────────
      # This step proves whether the problem is the FILE or the PASSWORD,
      # instead of guessing. It will show the alias if the password is
      # correct, or a clear "password incorrect" / "invalid keystore format"
      # error if something is still wrong — and we'll know exactly which.
      - name: Verify decoded keystore
        run: |
          echo "File size in bytes:"
          wc -c < android/app/release-key.jks
          echo "---"
          echo "Attempting to list keystore contents:"
          keytool -list -v \
            -keystore android/app/release-key.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" || true

      # ── Run a Flutter release build with signing credentials as env vars ──
      # build.gradle.kts reads these via System.getenv(...) when no local
      # key.properties file is present (which is always true on CI).
      - name: Build signed release APK
        env:
          CM_KEYSTORE_PATH:     release-key.jks
          CM_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          CM_KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          CM_KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      # ── Clean up the decoded keystore before any later steps/artifacts ───
      - name: Remove decoded keystore
        if: always()
        run: rm -f android/app/release-key.jks

      # ── Upload the APK as a downloadable build artifact ───────────────────
      # Available from the Actions run page for 90 days (GitHub default).
      # This step always runs, whether triggered by main or a tag.
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      # ── Create a GitHub Release with the APK attached ──────────────────
      # Only runs when the trigger was a version tag (e.g. you ran:
      #   git tag v1.0.0 && git push origin v1.0.0
      # A normal push to main does NOT create a release — it only builds
      # and uploads the artifact above. This mirrors what Codemagic was
      # doing, but you control exactly when a release is cut by tagging.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
